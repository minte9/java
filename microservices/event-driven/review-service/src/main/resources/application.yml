server:
  port: 7002

spring:
  application:
    name: product-review
    
  cloud:
    function:
      definition: product
      
    stream:
      defaultBinder: rabbit
      bindings:
        product-in-0:
          destination: products
          group: product-review
      rabbit:
        bindings:
          product-in-0:
            consumer:
              autoBindDlq: true
  data:
    mongodb:
      host: mongodb
      port: 27017
      database: review-db

logging:
  level:
    root: INFO
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG